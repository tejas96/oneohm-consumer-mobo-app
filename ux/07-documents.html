<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Documents — OneOhm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{brand:{primary:'#76c044',dark:'#5ea031',secondary:'#0d74b8'},surface:{50:'#0A0A0F',100:'#111118',200:'#18181F'}},fontFamily:{sans:['Inter','system-ui']}}}}</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="project-context.js"></script>
    <style>
        :root {
            --brand-primary: #76c044;
            --brand-secondary: #0d74b8;
            --bg-main: #0D0E12;
            --bg-grad: linear-gradient(180deg, #0D0E12 0%, #16181D 100%);
            --surface: #181A20;
            --text-main: #E2E8F0;
            --text-dim: #94A3B8;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-strong: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.05);
            --nav-bg: rgba(13, 14, 18, 0.94);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); }
        .glass { background: var(--glass); backdrop-filter: blur(24px); border: 1px solid var(--glass-border); }
        .glass-strong { background: var(--glass-strong); backdrop-filter: blur(32px); border: 1px solid var(--glass-border); }
    </style>
</head>
<body class="bg-surface-50">
<div class="max-w-md mx-auto min-h-screen pb-24" style="background: var(--bg-grad);">

    <div class="px-6 pt-14 pb-4">
        <div class="flex items-center gap-3 mb-5">
            <a href="05-home-v2.html" class="w-10 h-10 rounded-xl glass flex items-center justify-center shrink-0">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
            </a>
            <div class="flex-1 min-w-0">
                <h1 class="text-xl font-bold text-white">Documents</h1>
                <p class="text-[11px] text-white/35 truncate" id="projLabel"></p>
            </div>
            <a href="13-switch-project.html?from=07-documents.html" class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl glass shrink-0">
                <div class="w-1.5 h-1.5 rounded-full" id="switchDot"></div>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
            </a>
        </div>
        <div class="glass rounded-2xl px-4 py-3.5 flex items-center gap-3">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span class="text-[13px] text-white/20">Search documents...</span>
        </div>
    </div>

    <div class="px-6 space-y-5" id="content"></div>

    <!-- Bottom Nav -->
    <div class="fixed bottom-0 left-0 right-0 z-50 max-w-md mx-auto" style="background:rgba(17,17,24,0.92);backdrop-filter:blur(30px);border-top:1px solid rgba(255,255,255,0.06)">
        <div class="flex justify-around items-center py-2.5 px-4 pb-7">
            <a href="05-home-v2.html" class="flex flex-col items-center gap-1"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="text-[10px] text-white/30">Home</span></a>
            <a href="06-project.html" class="flex flex-col items-center gap-1"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg><span class="text-[10px] text-white/30">Project</span></a>
            <a href="07-documents.html" class="flex flex-col items-center gap-1"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#76c044" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span class="text-[10px] font-semibold text-brand-primary">Docs</span><div class="w-1 h-1 rounded-full bg-brand-primary"></div></a>
            <a href="08-payments-v2.html" class="flex flex-col items-center gap-1"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.8"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg><span class="text-[10px] text-white/30">Payments</span></a>
            <a href="11-profile.html" class="flex flex-col items-center gap-1"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="text-[10px] text-white/30">Profile</span></a>
        </div>
    </div>
</div>

<script>
const p = getActiveProject();
const sc = {IN_PROGRESS:'#EAB308',PLANNING:'#0d74b8',COMPLETED:'#76c044',ON_HOLD:'#EF4444'}[p.status]||'#76c044';
const isCompleted = p.status === 'COMPLETED';

document.getElementById('projLabel').textContent = p.label;
document.getElementById('switchDot').style.cssText = `background:${sc};box-shadow:0 0 6px ${sc};border-radius:50%;width:6px;height:6px;display:inline-block;`;

// Documents availability depends on project progress
const agreements = [
    { name: 'Net Metering Agreement', size: '1.2 MB', date: p.startDate, available: true,  color: '#76c044' },
    { name: 'Model Agreement',         size: '845 KB', date: p.startDate, available: true,  color: '#76c044' },
];
const paidSteps  = p.timeline.filter(s => s.status === 'done' && s.amount);
const invoices   = paidSteps.map((s, i) => ({
    name:      `Invoice #INV-00${i + 1} — ${s.amount}`,
    status:    'Paid',
    statusCol: '#76c044',
    date:      s.date,
    available: true,
}));
const pendingInvoices = p.timeline.filter(s => s.status === 'active' && s.amount).map((s, i) => ({
    name:      `Invoice #INV-00${paidSteps.length + i + 1} — ${s.amount}`,
    status:    'Pending',
    statusCol: '#EAB308',
    date:      s.date,
    available: true,
}));

const docIcon = (color) => `<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
const dlIcon   = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;

function docRow(icon, name, sub, dl=true) {
    return `<div class="glass rounded-2xl p-4 flex items-center gap-3.5 active:scale-[0.98] transition-transform">
        <div class="w-11 h-11 rounded-xl flex items-center justify-center shrink-0" style="background:rgba(255,255,255,0.04)">${icon}</div>
        <div class="flex-1 min-w-0">${name}<div class="text-[10px] text-white/25 mt-0.5">${sub}</div></div>
        ${dl ? dlIcon : ''}
    </div>`;
}

const c = document.getElementById('content');

// Agreements
c.innerHTML += `<div><h3 class="text-[11px] font-bold text-white/40 uppercase tracking-wider mb-3">Agreements</h3><div class="space-y-2.5">` +
    agreements.map(d => docRow(
        docIcon(d.color),
        `<p class="text-[12px] font-semibold text-white/85 truncate">${d.name}</p>`,
        `PDF · ${d.size} · ${d.date}`,
        d.available
    )).join('') +
`</div></div>`;

// Invoices
const allInvoices = [...invoices, ...pendingInvoices];
if (allInvoices.length > 0) {
    c.innerHTML += `<div><h3 class="text-[11px] font-bold text-white/40 uppercase tracking-wider mb-3">Invoices</h3><div class="space-y-2.5">` +
        allInvoices.map(d => docRow(
            docIcon(d.statusCol),
            `<p class="text-[12px] font-semibold text-white/85 truncate">${d.name}</p>
             <span class="px-2 py-0.5 rounded-full text-[9px] font-bold" style="background:${d.statusCol}18;color:${d.statusCol}">${d.status}</span>`,
            d.date
        )).join('') +
    `</div></div>`;
}

// Technical
c.innerHTML += `<div><h3 class="text-[11px] font-bold text-white/40 uppercase tracking-wider mb-3">Technical</h3><div class="space-y-2.5">` +
    docRow(docIcon('#A855F7'), `<p class="text-[12px] font-semibold text-white/85 truncate">System Design Layout</p>`, 'PDF · 3.4 MB') +
    docRow(docIcon('#A855F7'), `<p class="text-[12px] font-semibold text-white/85 truncate">Site Survey Report</p>`,   'PDF · 2.1 MB') +
`</div></div>`;

// Certificates (only if completed)
c.innerHTML += `<div><h3 class="text-[11px] font-bold text-white/40 uppercase tracking-wider mb-3">Certificates & Warranty</h3>`;
if (isCompleted) {
    c.innerHTML += `<div class="space-y-2.5">` +
        docRow(docIcon('#10B981'), `<p class="text-[12px] font-semibold text-white/85 truncate">Completion Certificate</p>`,  'PDF · 890 KB') +
        docRow(docIcon('#10B981'), `<p class="text-[12px] font-semibold text-white/85 truncate">Warranty Card — 25 Years</p>`, 'PDF · 560 KB') +
    `</div>`;
} else {
    c.innerHTML += `<div class="glass rounded-2xl p-7 flex flex-col items-center text-center">
        <div class="w-14 h-14 rounded-2xl bg-white/[0.03] flex items-center justify-center mb-3">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <p class="text-[12px] font-semibold text-white/30">Available after project completion</p>
    </div>`;
}
c.innerHTML += `</div>`;
</script>
</body>
</html>
