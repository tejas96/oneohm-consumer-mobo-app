name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: read
  pull-requests: write
  issues: write
  checks: write
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '17'

jobs:
  # ==========================================
  # QUALITY CHECKS (Parallel)
  # ==========================================
  quality-checks:
    name: Quality (${{ matrix.check }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        check: ['lint', 'format', 'type-check', 'test']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Run ${{ matrix.check }}
        run: |
          case "${{ matrix.check }}" in
            lint)
              npm run lint
              ;;
            format)
              npm run format:check
              ;;
            type-check)
              npm run type-check
              ;;
            test)
              npm run test:coverage
              ;;
          esac

      - name: Upload test coverage
        if: matrix.check == 'test'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false
        continue-on-error: true

      - name: Archive test results
        if: matrix.check == 'test' && always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: coverage/
          retention-days: 7

  # ==========================================
  # SECURITY AUDIT
  # ==========================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Run security audit
        run: |
          npm audit --audit-level=high || true
        continue-on-error: true

      - name: Check lockfile sync
        run: |
          npm ci --dry-run || {
            echo "❌ package-lock.json is out of sync"
            exit 1
          }
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

  # ==========================================
  # BUILD ANDROID DEBUG (PRs & develop)
  # ==========================================
  build-android-debug:
    name: Build Android (Debug)
    runs-on: ubuntu-latest
    needs: [quality-checks]
    timeout-minutes: 30
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Create staging .env
        env:
          API_URL: ${{ secrets.STAGING_API_URL }}
        run: |
          {
            echo "API_URL=${API_URL:-https://api.example.com}"
            echo "API_TIMEOUT=30000"
            echo "APP_NAME=OneOhm"
            echo "APP_ENV=staging"
            echo "ENABLE_ANALYTICS=false"
            echo "ENABLE_CRASH_REPORTING=true"
          } > .env
          echo "✅ Staging .env created ($(wc -l < .env) vars)"

      - name: Build Android APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --build-cache -PreactNativeArchitectures=arm64-v8a

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: app-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # ==========================================
  # PRE-MERGE GATE (for PRs)
  # ==========================================
  pre-merge:
    name: ✅ Ready to Merge
    runs-on: ubuntu-latest
    needs: [quality-checks, security]
    if: github.event_name == 'pull_request'

    steps:
      - name: All checks passed
        run: |
          echo "✅ All quality checks passed!"
          echo "✅ Security audit passed!"
          echo "🎉 This PR is ready for review and merge"

  # ==========================================
  # BUNDLE SIZE ANALYSIS (PRs only)
  # ==========================================
  bundle-analysis:
    name: 📦 Bundle Size
    runs-on: ubuntu-latest
    needs: [quality-checks]
    timeout-minutes: 15
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Generate bundle
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output bundle.js \
            --reset-cache

      - name: Analyze bundle size
        id: bundle-size
        run: |
          SIZE=$(du -h bundle.js | cut -f1)
          SIZE_BYTES=$(stat -c%s bundle.js 2>/dev/null || stat -f%z bundle.js)
          echo "📦 Bundle size: $SIZE ($SIZE_BYTES bytes)"
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      - name: Comment PR with bundle size
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const size = '${{ steps.bundle-size.outputs.size }}';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📦 **Bundle Size**: ${size}\n\n_This is the JavaScript bundle size for Android._`
            });


