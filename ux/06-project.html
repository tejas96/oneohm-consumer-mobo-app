<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project — OneOhm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{brand:{primary:'#76c044',dark:'#5ea031',secondary:'#0d74b8'},surface:{50:'#0A0A0F',100:'#111118',200:'#18181F',300:'#1E1E28'}},fontFamily:{sans:['Inter','system-ui']}}}}</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="project-context.js"></script>
    <style>
        :root {
            --brand-primary: #76c044;
            --brand-secondary: #0d74b8;
            --bg-main: #0D0E12;
            --bg-grad: linear-gradient(180deg, #0D0E12 0%, #16181D 100%);
            --surface: #181A20;
            --text-main: #E2E8F0;
            --text-dim: #94A3B8;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-strong: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.05);
            --nav-bg: rgba(13, 14, 18, 0.94);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); }
        .glass { background: var(--glass); backdrop-filter: blur(24px); border: 1px solid var(--glass-border); }
        .glass-strong { background: var(--glass-strong); backdrop-filter: blur(32px); border: 1px solid var(--glass-border); }
        @keyframes pulseGlow{0%,100%{box-shadow:0 0 16px rgba(118,192,68,0.2)}50%{box-shadow:0 0 28px rgba(118,192,68,0.45)}}
    </style>
</head>
<body class="bg-surface-50">
<div class="max-w-md mx-auto min-h-screen pb-24" style="background:linear-gradient(180deg,#0A0A0F,#111118);">

    <!-- Header -->
    <div class="px-6 pt-14 pb-5">
        <div class="flex items-center gap-3 mb-5">
            <a href="05-home-v2.html" class="w-10 h-10 rounded-xl glass flex items-center justify-center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></a>
            <div class="flex-1 min-w-0">
                <h1 class="text-xl font-bold text-white">Project Timeline</h1>
                <p class="text-[11px] text-white/35 truncate" id="projAddress"></p>
            </div>
            <a href="13-switch-project.html?from=06-project.html" class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl glass shrink-0">
                <div class="w-1.5 h-1.5 rounded-full" id="switchDot"></div>
                <span class="text-[11px] font-semibold text-white/60" id="switchLabel"></span>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
            </a>
        </div>

        <!-- Stats card -->
        <div class="glass-strong rounded-2xl p-4 flex items-center justify-between">
            <div>
                <p class="text-[13px] font-semibold text-white" id="systemLabel"></p>
                <p class="text-[11px] text-white/35" id="projMeta"></p>
            </div>
            <div class="text-right">
                <p class="text-2xl font-extrabold text-brand-primary" id="progressPct"></p>
                <p class="text-[10px] text-white/25">Complete</p>
            </div>
        </div>
    </div>

    <!-- Timeline — rendered by JS -->
    <div class="px-6">
        <div class="relative" id="timeline">
            <div class="absolute left-[19px] top-4 bottom-0 w-[2px]" id="timelineLine"></div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 z-50 max-w-md mx-auto" style="background:rgba(17,17,24,0.92);backdrop-filter:blur(30px);border-top:1px solid rgba(255,255,255,0.06)">
        <div class="flex justify-around items-center py-2.5 px-4 pb-7">
            <a href="05-home-v2.html" class="flex flex-col items-center gap-1"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="text-[10px] text-white/30">Home</span></a>
            <a href="06-project.html" class="flex flex-col items-center gap-1"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#76c044" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/><path d="M3 9h6"/></svg><span class="text-[10px] font-semibold text-brand-primary">Project</span><div class="w-1 h-1 rounded-full bg-brand-primary"></div></a>
            <a href="07-documents.html" class="flex flex-col items-center gap-1"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span class="text-[10px] text-white/30">Docs</span></a>
            <a href="08-payments-v2.html" class="flex flex-col items-center gap-1"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.8"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg><span class="text-[10px] text-white/30">Payments</span></a>
            <a href="11-profile.html" class="flex flex-col items-center gap-1"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="text-[10px] text-white/30">Profile</span></a>
        </div>
    </div>
</div>

<script>
const p = getActiveProject();
const sc = { IN_PROGRESS:'#EAB308', PLANNING:'#0d74b8', COMPLETED:'#76c044', ON_HOLD:'#EF4444' }[p.status] || '#76c044';

document.getElementById('projAddress').textContent   = p.address;
document.getElementById('systemLabel').textContent   = `${p.systemKw} kW · ${p.panels} Panels · ${p.type}`;
document.getElementById('projMeta').textContent      = `${p.id} · Started ${p.startDate}`;
document.getElementById('progressPct').textContent   = p.progress + '%';
document.getElementById('switchLabel').textContent   = p.label;
document.getElementById('switchDot').style.background = sc;
document.getElementById('switchDot').style.boxShadow = `0 0 6px ${sc}`;

// Timeline gradient line
const completedSteps = p.timeline.filter(s => s.status === 'done').length;
const totalSteps = p.timeline.length;
const lineGradPct = Math.round((completedSteps / totalSteps) * 100);
document.getElementById('timelineLine').style.background =
    `linear-gradient(180deg, #76c044 0%, #76c044 ${lineGradPct}%, rgba(255,255,255,0.06) ${lineGradPct}%, rgba(255,255,255,0.04) 100%)`;

// Build timeline steps
const tlEl = document.getElementById('timeline');
p.timeline.forEach((step, i) => {
    const isDone   = step.status === 'done';
    const isActive = step.status === 'active';
    const isLocked = step.status === 'locked';
    const isLast   = i === p.timeline.length - 1;

    const wrapper = document.createElement('div');
    wrapper.className = `relative pl-14 ${isLast ? 'pb-4' : 'pb-7'}`;

    let iconHtml, cardHtml;

    if (isDone) {
        iconHtml = `<div class="absolute left-0 top-0 w-10 h-10 rounded-full flex items-center justify-center" style="background:#76c044;box-shadow:0 0 16px rgba(118,192,68,0.25)"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>`;
        cardHtml = `
            <div class="glass rounded-2xl p-4">
                <div class="flex justify-between items-start mb-1"><h3 class="text-[13px] font-bold text-white">${step.title}</h3><span class="text-[10px] font-semibold text-brand-primary shrink-0 ml-2">Done</span></div>
                ${step.amount ? `<p class="text-[11px] text-brand-primary/70 mb-1">${step.amount}</p>` : ''}
                ${step.date ? `<p class="text-[10px] text-white/20">${step.date}</p>` : ''}
            </div>`;
    } else if (isActive) {
        iconHtml = `<div class="absolute left-0 top-0 w-10 h-10 rounded-full flex items-center justify-center" style="background:${sc};animation:pulseGlow 2s ease-in-out infinite"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>`;
        cardHtml = `
            <div class="rounded-2xl p-4" style="background:rgba(13,116,184,0.07);border:1px solid ${sc}33">
                <div class="flex justify-between items-start mb-1"><h3 class="text-[13px] font-bold text-white">${step.title}</h3><span class="text-[10px] font-semibold shrink-0 ml-2" style="color:${sc}">Active</span></div>
                ${step.amount ? `<p class="text-[11px] mb-2" style="color:${sc}">${step.amount}</p>` : ''}
                ${step.date ? `<div class="rounded-xl p-2.5 mb-3" style="background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.15)"><p class="text-[11px] font-semibold text-yellow-400">⏰ ${step.date}</p><a href="08-payments-v2.html" class="block w-full py-2 rounded-lg text-center text-white font-semibold text-[12px] mt-2" style="background:linear-gradient(135deg,#76c044,#5ea031)">Upload Payment Proof</a></div>` : ''}
                <div class="flex items-center gap-2 mt-1"><div class="w-6 h-6 rounded-full flex items-center justify-center text-[9px] font-bold text-white" style="background:${p.manager.color}40;border:1px solid ${p.manager.color}30;color:${p.manager.color}">${p.manager.initials}</div><p class="text-[10px] text-white/25">${p.manager.name} — Project Manager</p></div>
            </div>`;
    } else {
        iconHtml = `<div class="absolute left-0 top-0 w-10 h-10 rounded-full flex items-center justify-center" style="background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.08)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>`;
        cardHtml = `
            <div class="glass rounded-2xl p-4 opacity-45">
                <h3 class="text-[13px] font-bold text-white/60">${step.title}</h3>
                <p class="text-[11px] text-white/25 mt-1">Locked</p>
            </div>`;
    }

    wrapper.innerHTML = iconHtml + cardHtml;
    tlEl.appendChild(wrapper);
});
</script>
</body>
</html>
