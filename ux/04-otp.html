<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verify OTP — OneOhm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: { brand: { primary: '#76c044', dark: '#5ea031', secondary: '#0d74b8' }, surface: { 50: '#0A0A0F', 100: '#111118', 200: '#18181F', 300: '#1E1E28' } },
                fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
            }}
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseGlow { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
        .glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.06); }
        .otp-box { width: 56px; height: 68px; text-align: center; font-size: 26px; font-weight: 700; border-radius: 18px; border: 2px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); color: white; outline: none; transition: all 0.3s cubic-bezier(0.16,1,0.3,1); caret-color: #76c044; }
        .otp-box:focus { border-color: #76c044; box-shadow: 0 0 24px rgba(118,192,68,0.12); background: rgba(118,192,68,0.04); }
        .otp-box.filled { border-color: rgba(118,192,68,0.35); background: rgba(118,192,68,0.05); }
    </style>
</head>
<body class="bg-surface-50 overflow-hidden">
    <div class="max-w-md mx-auto min-h-screen relative flex flex-col" style="background: linear-gradient(180deg, #0A0A0F 0%, #111118 100%);">

        <!-- Ambient Glow -->
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[400px] h-[400px] rounded-full pointer-events-none" style="background: radial-gradient(circle, rgba(118,192,68,0.06) 0%, transparent 70%); animation: pulseGlow 4s ease-in-out infinite;"></div>

        <div class="relative z-10 flex flex-col flex-1 px-8 pt-16 pb-10">

            <!-- Back Button -->
            <a href="03-login.html" class="w-10 h-10 rounded-xl glass flex items-center justify-center mb-10" style="animation: fadeUp 0.4s ease forwards;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
            </a>

            <!-- Heading -->
            <div style="animation: fadeUp 0.5s ease 0.1s forwards; opacity: 0;">
                <h1 class="text-[30px] font-extrabold text-white leading-tight mb-3">Verify Your<br>Number</h1>
                <p class="text-[15px] text-white/40 leading-relaxed">We sent a 6-digit code to <span class="text-white/70 font-medium">+91 98765 43210</span></p>
            </div>

            <!-- OTP Inputs -->
            <div class="mt-10 flex items-center justify-between gap-2.5" style="animation: fadeUp 0.5s ease 0.2s forwards; opacity: 0;">
                <input type="tel" maxlength="1" value="4" class="otp-box filled" readonly>
                <input type="tel" maxlength="1" value="8" class="otp-box filled" readonly>
                <input type="tel" maxlength="1" value="2" class="otp-box filled" readonly>
                <input type="tel" maxlength="1" value="7" class="otp-box filled" readonly>
                <input type="tel" maxlength="1" value="1" class="otp-box filled" readonly>
                <input type="tel" maxlength="1" class="otp-box" placeholder="·">
            </div>

            <!-- Resend -->
            <div class="mt-6 text-center" style="animation: fadeUp 0.5s ease 0.3s forwards; opacity: 0;">
                <p class="text-sm text-white/30">Didn't receive the code? <span class="text-brand-primary font-semibold cursor-pointer">Resend in 0:28</span></p>
            </div>

            <!-- Auto-detect badge -->
            <div class="mt-6 flex items-center justify-center gap-2 glass rounded-full py-2.5 px-5 mx-auto" style="animation: fadeUp 0.5s ease 0.4s forwards; opacity: 0;">
                <div class="w-2 h-2 rounded-full bg-brand-primary animate-pulse"></div>
                <span class="text-xs text-white/40 font-medium">Auto-detecting OTP...</span>
            </div>

            <div class="flex-1"></div>

            <!-- Verify Button -->
            <div style="animation: fadeUp 0.5s ease 0.5s forwards; opacity: 0;">
                <a href="05-home.html" class="block w-full py-4 rounded-2xl text-center text-white font-semibold text-[16px] transition-all active:scale-[0.97]" style="background: linear-gradient(135deg, #76c044 0%, #5ea031 100%); box-shadow: 0 4px 24px rgba(118,192,68,0.2);">
                    Verify & Continue
                </a>
            </div>
        </div>
    </div>
</body>
</html>
