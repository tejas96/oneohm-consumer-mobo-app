<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile — OneOhm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{brand:{primary:'#76c044',dark:'#5ea031',secondary:'#0d74b8'},surface:{50:'#0A0A0F',100:'#111118',200:'#18181F'}},fontFamily:{sans:['Inter','system-ui']}}}}</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="project-context.js"></script>
    <script src="language-context.js"></script>
    <style>
        :root {
            --brand-primary: #76c044;
            --brand-secondary: #0d74b8;
            --bg-main: #0D0E12;
            --bg-grad: linear-gradient(180deg, #0D0E12 0%, #16181D 100%);
            --surface: #181A20;
            --text-main: #E2E8F0;
            --text-dim: #94A3B8;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-strong: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.05);
            --nav-bg: rgba(13, 14, 18, 0.94);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); }
        .glass { background: var(--glass); backdrop-filter: blur(24px); border: 1px solid var(--glass-border); }
        .glass-strong { background: var(--glass-strong); backdrop-filter: blur(32px); border: 1px solid var(--glass-border); }
    </style>
</head>
<body class="bg-surface-50">
<div class="max-w-md mx-auto min-h-screen pb-24" style="background:linear-gradient(180deg,#0A0A0F,#111118);">

    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[400px] h-[280px] pointer-events-none" style="background:radial-gradient(ellipse at 50% 0%,rgba(118,192,68,0.08),transparent 70%)"></div>

    <!-- Profile Header -->
    <div class="relative z-10 px-6 pt-14 pb-5 text-center">
        <div class="w-24 h-24 rounded-3xl mx-auto mb-3 flex items-center justify-center border-2 border-brand-primary/20" style="background:linear-gradient(135deg,rgba(118,192,68,0.14),rgba(13,116,184,0.10));box-shadow:0 15px 35px rgba(118,192,68,0.12)">
            <span class="text-3xl font-bold text-white">RK</span>
        </div>
        <h1 class="text-[22px] font-extrabold mb-1">Raj Kumar</h1>
        <p class="text-[12px] opacity-40">+91 98765 43210 · raj@email.com</p>
        <div class="mt-2.5 inline-flex items-center gap-1.5 px-3.5 py-1.5 rounded-full" style="background:rgba(118,192,68,0.08);border:1px solid rgba(118,192,68,0.18)">
            <div class="w-1.5 h-1.5 rounded-full bg-brand-primary animate-pulse"></div>
            <span class="text-[11px] font-semibold text-brand-primary" id="totalProjectsBadge"></span>
        </div>
    </div>

    <div class="px-6 space-y-5">

        <!-- Language Switcher -->
        <div>
            <h3 class="text-[11px] font-bold opacity-30 uppercase tracking-wider mb-2.5">Language / भाषा</h3>
            <div class="glass-strong rounded-2xl p-1 flex items-center">
                <button onclick="setActiveLanguage('en')" id="lang-en" class="flex-1 py-2.5 rounded-xl text-[12px] font-bold transition-all">English</button>
                <button onclick="setActiveLanguage('mr')" id="lang-mr" class="flex-1 py-2.5 rounded-xl text-[12px] font-bold transition-all">मराठी</button>
            </div>
        </div>

        <!-- Aggregate Stats across ALL projects -->
        <div>
            <h3 class="text-[11px] font-bold opacity-40 uppercase tracking-wider mb-3" id="portfolio-title">Portfolio Overview</h3>
            <div class="grid grid-cols-3 gap-2.5" id="statsGrid"></div>
        </div>

        <!-- All Projects (mini list) -->
        <div>
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-[11px] font-bold opacity-40 uppercase tracking-wider">My Projects</h3>
                <a href="13-switch-project.html?from=11-profile.html" class="text-[11px] font-semibold text-brand-primary">View All</a>
            </div>
            <div class="space-y-2.5" id="projectMiniList"></div>
        </div>

        <!-- Active Project Details -->
        <div>
            <h3 class="text-[11px] font-bold opacity-40 uppercase tracking-wider mb-3">Active Project Details</h3>
            <div class="glass-strong rounded-2xl p-4 space-y-3" id="activeDetails"></div>
        </div>

        <!-- Account Menu -->
        <div>
            <h3 class="text-[11px] font-bold opacity-40 uppercase tracking-wider mb-3">Account</h3>
            <div class="glass-strong rounded-2xl overflow-hidden">
                <a href="14-theme-showcase.html" class="flex items-center justify-between px-4 py-3.5 active:bg-black/5 dark:active:bg-white/5 transition-colors" style="background: linear-gradient(90deg, rgba(16,185,129,0.1), rgba(16,185,129,0.02)); border-left: 3px solid #10B981;">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 rounded-xl bg-emerald-500/20 flex items-center justify-center border border-emerald-500/30">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#34D399" stroke-width="2" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                        </div>
                        <div>
                            <span class="text-[12px] font-extrabold text-white block">Design Identity Lab</span>
                            <span class="text-[10px] text-emerald-400 font-semibold block">6 Premium Patterns</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="px-2 py-0.5 rounded-full text-[9px] font-black uppercase tracking-wider bg-emerald-400/20 text-emerald-300">New</span>
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="opacity-30" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                    </div>
                </a>
                <div class="border-t border-black/[0.04] dark:border-white/[0.04] mx-4"></div>
                <a href="12-notifications.html" class="flex items-center justify-between px-4 py-3.5 active:bg-black/5 dark:active:bg-white/5 transition-colors">
                    <div class="flex items-center gap-3"><div class="w-9 h-9 rounded-xl bg-brand-primary/10 flex items-center justify-center"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#76c044" stroke-width="1.8"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg></div><span class="text-[12px] font-medium opacity-80">Notifications</span></div>
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="opacity-20" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                </a>
                <div class="border-t border-black/[0.04] dark:border-white/[0.04] mx-4"></div>
                <a href="10-team.html" class="flex items-center justify-between px-4 py-3.5 active:bg-black/5 dark:active:bg-white/5 transition-colors">
                    <div class="flex items-center gap-3"><div class="w-9 h-9 rounded-xl bg-brand-secondary/10 flex items-center justify-center"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#0d74b8" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><span class="text-[12px] font-medium opacity-80">Your Team</span></div>
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="opacity-20" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                </a>
                <div class="border-t border-black/[0.04] dark:border-white/[0.04] mx-4"></div>
                <div class="flex items-center justify-between px-4 py-3.5 active:bg-black/5 dark:active:bg-white/5 transition-colors">
                    <div class="flex items-center gap-3"><div class="w-9 h-9 rounded-xl bg-gray-500/10 flex items-center justify-center"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="opacity-50" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4"/></svg></div><span class="text-[12px] font-medium opacity-80">Settings</span></div>
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="opacity-20" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                </a>
                <div class="border-t border-black/[0.04] dark:border-white/[0.04] mx-4"></div>
                <a href="03-login.html" class="flex items-center px-4 py-3.5 active:bg-black/5 dark:active:bg-white/5 transition-colors gap-3">
                    <div class="w-9 h-9 rounded-xl bg-red-500/10 flex items-center justify-center"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div>
                    <span class="text-[12px] font-medium text-red-500/80">Sign Out</span>
                </a>
            </div>
a>
            </div>
        </div>

        <p class="text-center text-[10px] opacity-10 pt-1 pb-6">OneOhm v1.0.0</p>
    </div>

    <!-- Bottom Nav -->
    <div class="fixed bottom-0 left-0 right-0 z-50 max-w-md mx-auto" style="background:var(--nav-bg);backdrop-filter:blur(30px);border-top:1px solid var(--glass-border)">
        <div class="flex justify-around items-center py-2.5 px-4 pb-7">
            <a href="05-home.html" class="flex flex-col items-center gap-1"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="opacity-30" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="text-[10px] opacity-30" id="nav-home">Home</span></a>
            <a href="06-project.html" class="flex flex-col items-center gap-1"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="opacity-30" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg><span class="text-[10px] opacity-30" id="nav-project">Project</span></a>
            <a href="07-documents.html" class="flex flex-col items-center gap-1"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="opacity-30" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span class="text-[10px] opacity-30" id="nav-docs">Docs</span></a>
            <a href="08-payments.html" class="flex flex-col items-center gap-1"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="opacity-30" stroke-width="1.8"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg><span class="text-[10px] opacity-30" id="nav-payments">Payments</span></a>
            <a href="11-profile.html" class="flex flex-col items-center gap-1"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#76c044" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="text-[10px] font-semibold text-brand-primary" id="nav-profile">Profile</span><div class="w-1 h-1 rounded-full bg-brand-primary"></div></a>
        </div>
    </div>
</div>

<script>
const active = getActiveProject();
const lang = getActiveLanguage();
const sc = c => ({IN_PROGRESS:'#EAB308',PLANNING:'#0d74b8',COMPLETED:'#76c044',ON_HOLD:'#EF4444'}[c]||'#76c044');

// Update UI text
document.getElementById('nav-home').textContent = t('home');
document.getElementById('nav-project').textContent = t('project');
document.getElementById('nav-docs').textContent = t('docs');
document.getElementById('nav-payments').textContent = t('payments');
document.getElementById('nav-profile').textContent = t('profile');

// Language toggle highlight
const btnEn = document.getElementById('lang-en');
const btnMr = document.getElementById('lang-mr');

if (lang === 'en') {
    btnEn.classList.add('bg-brand-primary', 'text-white');
    btnMr.classList.add('opacity-30');
} else {
    btnMr.classList.add('bg-brand-primary', 'text-white');
    btnEn.classList.add('opacity-30');
}

// Aggregate stats across all projects
const totalKw    = PROJECTS.reduce((s,p) => s + p.systemKw, 0);
const totalPaid  = PROJECTS.reduce((s,p) => s + p.amountPaid, 0);
const completed  = PROJECTS.filter(p => p.status === 'COMPLETED').length;

document.getElementById('totalProjectsBadge').textContent =
    PROJECTS.length + ' Propert' + (PROJECTS.length===1?'y':'ies');

const stats = [
    { label:'Total kW',   value: totalKw + ' kW',          color:'#76c044' },
    { label:'Paid',       value: '₹' + Math.round(totalPaid/1000) + 'K', color:'#0d74b8' },
    { label:'Completed',  value: completed + '/' + PROJECTS.length, color:'#10B981' },
];
document.getElementById('statsGrid').innerHTML = stats.map(s => `
    <div class="glass-strong rounded-2xl p-3 text-center">
        <p class="text-[16px] font-extrabold" style="color:${s.color}">${s.value}</p>
        <p class="text-[9px] text-white/30 mt-0.5">${s.label}</p>
    </div>`).join('');

// Mini project list
const activeId = getActiveProjectId();
document.getElementById('projectMiniList').innerHTML = PROJECTS.map(p => `
    <a href="13-switch-project.html?from=11-profile.html" class="glass rounded-2xl p-3.5 flex items-center gap-3 active:scale-[0.98] transition-transform block ${p.id===activeId?'border-brand-primary/25':''}">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0 text-[11px] font-bold" style="background:${sc(p.status)}15;color:${sc(p.status)}">${p.systemKw}k</div>
        <div class="flex-1 min-w-0">
            <p class="text-[12px] font-semibold text-white/80 truncate">${p.label}</p>
            <p class="text-[10px] text-white/25 truncate">${p.id}</p>
        </div>
        <div class="flex flex-col items-end gap-1 shrink-0">
            <span class="text-[10px] font-bold" style="color:${sc(p.status)}">${p.progress}%</span>
            ${p.id===activeId ? `<div class="w-1.5 h-1.5 rounded-full bg-brand-primary"></div>` : ''}
        </div>
    </a>`).join('');

// Active project details
const detail = (label, val) => `
    <div class="flex justify-between items-center">
        <span class="text-[11px] text-white/35">${label}</span>
        <span class="text-[11px] font-semibold text-white/70">${val}</span>
    </div>
    <div class="border-t border-white/[0.04]"></div>`;

document.getElementById('activeDetails').innerHTML = [
    detail('Property',     active.label),
    detail('Type',         active.type),
    detail('Address',      active.address),
    detail('System Size',  active.systemKw + ' kW · ' + active.panels + ' Panels'),
    detail('DISCOM',       active.discom),
    detail('Consumer No.', active.consumerNo),
    detail('Monthly Bill', '₹3,500'),
    `<div class="flex justify-between items-center"><span class="text-[11px] text-white/35">Status</span><span class="px-2.5 py-0.5 rounded-full text-[10px] font-bold" style="background:${sc(active.status)}15;color:${sc(active.status)}">${active.statusLabel}</span></div>`,
].join('');
</script>
</body>
</html>
