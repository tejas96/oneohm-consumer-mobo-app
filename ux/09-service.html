<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Service Request — OneOhm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{brand:{primary:'#76c044',dark:'#5ea031',secondary:'#0d74b8'},surface:{50:'#0A0A0F',100:'#111118',200:'#18181F'}},fontFamily:{sans:['Inter','system-ui']}}}}</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',system-ui,sans-serif}.glass{background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.06)}</style>
</head>
<body class="bg-surface-50">
<div class="max-w-md mx-auto min-h-screen pb-10" style="background:linear-gradient(180deg,#0A0A0F,#111118);">

    <!-- Header -->
    <div class="px-6 pt-14 pb-4">
        <div class="flex items-center gap-3 mb-2">
            <a href="05-home-v2.html" class="w-10 h-10 rounded-xl glass flex items-center justify-center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></a>
            <h1 class="text-xl font-bold text-white">Service Request</h1>
        </div>
        <p class="text-[13px] text-white/35 ml-[52px]">Raise a support or maintenance request</p>
    </div>

    <div class="px-6 space-y-5 mt-4">

        <!-- Issue Category -->
        <div>
            <label class="text-[11px] font-bold text-white/40 uppercase tracking-wider mb-3 block">Select Issue Type</label>
            <div class="grid grid-cols-2 gap-2.5">
                <div class="glass rounded-2xl p-4 text-center border-2 border-brand-primary/30 active:scale-[0.97] transition-transform cursor-pointer" style="background:rgba(118,192,68,0.05)">
                    <div class="w-10 h-10 rounded-xl bg-brand-primary/15 flex items-center justify-center mx-auto mb-2">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#76c044" stroke-width="1.8" stroke-linecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                    </div>
                    <p class="text-[11px] font-semibold text-white/80">Panel Issue</p>
                </div>
                <div class="glass rounded-2xl p-4 text-center active:scale-[0.97] transition-transform cursor-pointer">
                    <div class="w-10 h-10 rounded-xl bg-brand-secondary/10 flex items-center justify-center mx-auto mb-2">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0d74b8" stroke-width="1.8" stroke-linecap="round"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>
                    </div>
                    <p class="text-[11px] font-semibold text-white/80">Inverter</p>
                </div>
                <div class="glass rounded-2xl p-4 text-center active:scale-[0.97] transition-transform cursor-pointer">
                    <div class="w-10 h-10 rounded-xl bg-yellow-500/10 flex items-center justify-center mx-auto mb-2">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#EAB308" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9"/></svg>
                    </div>
                    <p class="text-[11px] font-semibold text-white/80">Wiring</p>
                </div>
                <div class="glass rounded-2xl p-4 text-center active:scale-[0.97] transition-transform cursor-pointer">
                    <div class="w-10 h-10 rounded-xl bg-purple-500/10 flex items-center justify-center mx-auto mb-2">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#A855F7" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    </div>
                    <p class="text-[11px] font-semibold text-white/80">Other</p>
                </div>
            </div>
        </div>

        <!-- Issue Title -->
        <div>
            <label class="text-[11px] font-bold text-white/40 uppercase tracking-wider mb-2 block">Issue Title</label>
            <div class="glass rounded-2xl px-4 py-3.5">
                <input type="text" placeholder="Brief description of the issue" value="Solar panel not generating output" class="w-full bg-transparent outline-none text-white text-[14px] placeholder-white/20">
            </div>
        </div>

        <!-- Description -->
        <div>
            <label class="text-[11px] font-bold text-white/40 uppercase tracking-wider mb-2 block">Description</label>
            <div class="glass rounded-2xl px-4 py-3.5">
                <textarea rows="3" placeholder="Detailed description..." class="w-full bg-transparent outline-none text-white text-[14px] placeholder-white/20 resize-none">Panel #3 on the east side is showing zero output since yesterday morning. Other panels seem to be working fine.</textarea>
            </div>
        </div>

        <!-- Photo Upload -->
        <div>
            <label class="text-[11px] font-bold text-white/40 uppercase tracking-wider mb-2 block">Attach Photos</label>
            <div class="flex gap-2.5">
                <div class="w-20 h-20 rounded-2xl glass flex flex-col items-center justify-center cursor-pointer active:scale-[0.97] transition-transform" style="border:2px dashed rgba(255,255,255,0.1)">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.8" stroke-linecap="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
                    <span class="text-[9px] text-white/20 mt-1">Add</span>
                </div>
                <div class="w-20 h-20 rounded-2xl bg-white/[0.06] flex items-center justify-center overflow-hidden">
                    <div class="w-full h-full bg-gradient-to-br from-brand-primary/20 to-surface-200 flex items-center justify-center">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- Priority -->
        <div>
            <label class="text-[11px] font-bold text-white/40 uppercase tracking-wider mb-2 block">Priority</label>
            <div class="flex gap-2">
                <span class="px-4 py-2 rounded-xl glass text-[12px] text-white/40 font-medium cursor-pointer">Low</span>
                <span class="px-4 py-2 rounded-xl text-[12px] text-yellow-400 font-semibold cursor-pointer" style="background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.25)">Medium</span>
                <span class="px-4 py-2 rounded-xl glass text-[12px] text-white/40 font-medium cursor-pointer">High</span>
                <span class="px-4 py-2 rounded-xl glass text-[12px] text-white/40 font-medium cursor-pointer">Urgent</span>
            </div>
        </div>

        <!-- Submit -->
        <div class="pt-4 pb-6">
            <button class="w-full py-4 rounded-2xl text-center text-white font-semibold text-[15px] active:scale-[0.97] transition-transform" style="background:linear-gradient(135deg,#76c044,#5ea031);box-shadow:0 4px 24px rgba(118,192,68,0.2)">
                Submit Request
            </button>
        </div>
    </div>
</div>
</body>
</html>
