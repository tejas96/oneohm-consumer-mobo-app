<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login — OneOhm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: { brand: { primary: '#76c044', dark: '#5ea031', secondary: '#0d74b8' }, surface: { 50: '#0A0A0F', 100: '#111118', 200: '#18181F', 300: '#1E1E28' } },
                fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
            }}
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="language-context.js"></script>
    <style>
        :root {
            --brand-primary: #76c044;
            --brand-secondary: #0d74b8;
            --bg-main: #0D0E12;
            --bg-grad: linear-gradient(180deg, #0D0E12 0%, #16181D 100%);
            --surface: #181A20;
            --text-main: #E2E8F0;
            --text-dim: #94A3B8;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-strong: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.05);
        }
        body { font-family: 'Inter', system-ui, sans-serif; overflow: hidden; background: var(--bg-main); color: var(--text-main); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseGlow { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
        .glass { background: var(--glass); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--glass-border); }
    </style>
</head>
<body class="bg-surface-50 overflow-hidden">
    <div class="max-w-md mx-auto min-h-screen relative flex flex-col" style="background: var(--bg-grad);">

        <!-- Ambient glow -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[400px] h-[300px] pointer-events-none" style="background: radial-gradient(ellipse at 50% 0%, rgba(118,192,68,0.06), transparent 70%);"></div>

    <!-- Language Toggle (Top Right) -->
    <div class="absolute top-14 right-6 z-20">
        <div class="glass rounded-full p-1 flex items-center gap-1">
            <button onclick="setActiveLanguage('en')" id="lang-en" class="px-3 py-1 rounded-full text-[10px] font-bold transition-all">EN</button>
            <button onclick="setActiveLanguage('mr')" id="lang-mr" class="px-3 py-1 rounded-full text-[10px] font-bold transition-all">मराठी</button>
        </div>
    </div>

    <div class="px-8 pt-24 pb-8 flex flex-col min-h-screen relative z-10">

            <!-- Logo -->
            <div class="flex items-center gap-3 mb-16" style="animation: fadeUp 0.6s ease forwards;">
                <div class="w-12 h-12 rounded-2xl flex items-center justify-center" style="background: linear-gradient(135deg, #76c044, #5ea031);">
                    <svg width="24" height="24" viewBox="0 0 48 48" fill="none">
                        <circle cx="24" cy="24" r="14" stroke="white" stroke-width="2.5"/>
                        <circle cx="24" cy="24" r="5" fill="white"/>
                    </svg>
                </div>
                <span class="text-xl font-bold text-white">One<span class="text-brand-primary">Ohm</span></span>
            </div>

            <!-- Heading -->
            <div style="animation: fadeUp 0.6s ease 0.1s forwards; opacity: 0;">
                <h1 class="text-[32px] font-extrabold text-white leading-tight mb-3">Welcome<br>Back</h1>
                <p class="text-[15px] text-white/40 leading-relaxed">Enter your mobile number to access your solar project dashboard.</p>
            </div>

            <!-- Phone Input -->
            <div class="mt-10" style="animation: fadeUp 0.6s ease 0.2s forwards; opacity: 0;">
                <label class="text-xs font-semibold text-white/50 uppercase tracking-wider mb-3 block">Mobile Number</label>
                <div class="flex items-center gap-3">
                    <!-- Country Code -->
                    <div class="glass rounded-2xl px-4 py-4 flex items-center gap-2 shrink-0">
                        <span class="text-lg">🇮🇳</span>
                        <span class="text-white/70 font-semibold text-[15px]">+91</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                    <!-- Number Input -->
                    <div class="glass rounded-2xl flex-1 px-5 py-4">
                        <input type="tel" maxlength="10" placeholder="Enter mobile number" value="9876543210" class="w-full bg-transparent outline-none text-white text-[17px] font-medium placeholder-white/20 tracking-wider" id="phoneInput">
                    </div>
                </div>
            </div>

            <!-- Info text -->
            <div class="mt-5 flex items-start gap-2.5" style="animation: fadeUp 0.6s ease 0.3s forwards; opacity: 0;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" class="mt-0.5 shrink-0"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                <p class="text-xs text-white/25 leading-relaxed">We'll send you a one-time verification code via SMS. Your data is secure and encrypted.</p>
            </div>

            <!-- Spacer -->
            <div class="flex-1"></div>

            <!-- CTA Button -->
            <div style="animation: fadeUp 0.6s ease 0.4s forwards; opacity: 0;">
                <a href="04-otp.html" class="block w-full py-4 rounded-2xl text-center text-white font-semibold text-[16px] transition-all active:scale-[0.97] mb-4" style="background: linear-gradient(135deg, #76c044 0%, #5ea031 100%); box-shadow: 0 4px 24px rgba(118,192,68,0.2);">
                    Continue
                </a>
                <p class="text-center text-xs text-white/20">By continuing, you agree to our <span class="text-white/40 underline">Terms</span> & <span class="text-white/40 underline">Privacy Policy</span></p>
            </div>
        </div>
    </div>
<script>
    const lang = getActiveLanguage();
    const btnEn = document.getElementById('lang-en');
    const btnMr = document.getElementById('lang-mr');

    if (lang === 'en') {
        btnEn.classList.add('bg-brand-primary', 'text-white');
        btnEn.classList.remove('text-white/30');
        btnMr.classList.add('text-white/30');
    } else {
        btnMr.classList.add('bg-brand-primary', 'text-white');
        btnMr.classList.remove('text-white/30');
        btnEn.classList.add('text-white/30');
    }
</script>
</body>
</html>
