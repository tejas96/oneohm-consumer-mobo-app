<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OneOhm — Solar Energy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { primary: '#76c044', dark: '#5ea031', light: '#8fd055', secondary: '#0d74b8' },
                        surface: { 50: '#0A0A0F', 100: '#111118', 200: '#18181F' },
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #76c044;
            --brand-secondary: #0d74b8;
            --bg-main: #0D0E12;
            --bg-grad: linear-gradient(180deg, #0D0E12 0%, #16181D 100%);
            --surface: #181A20;
            --text-main: #E2E8F0;
            --text-dim: #94A3B8;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-main); color: var(--text-main); }
        @keyframes logoReveal {
            0% { opacity: 0; transform: scale(0.5) translateY(30px); filter: blur(12px); }
            60% { opacity: 1; transform: scale(1.06) translateY(-4px); filter: blur(0); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.1); }
        }
        @keyframes dotPulse {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.4); opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(15px, -20px); }
            66% { transform: translate(-10px, 10px); }
        }
        @keyframes ringPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(118,192,68,0.3); }
            50% { box-shadow: 0 0 0 20px rgba(118,192,68,0); }
        }
    </style>
</head>
<body class="bg-surface-50 overflow-hidden">
    <div class="max-w-md mx-auto min-h-screen relative flex flex-col items-center justify-center" style="background: var(--bg-grad);">

        <!-- Ambient Orb 1 -->
        <div class="absolute top-1/4 left-1/2 w-[420px] h-[420px] rounded-full pointer-events-none" style="background: radial-gradient(circle, rgba(118,192,68,0.10) 0%, rgba(118,192,68,0.03) 40%, transparent 70%); animation: pulseGlow 4s ease-in-out infinite;"></div>

        <!-- Ambient Orb 2 -->
        <div class="absolute bottom-1/3 right-0 w-[280px] h-[280px] rounded-full pointer-events-none" style="background: radial-gradient(circle, rgba(13,116,184,0.07) 0%, transparent 60%); animation: orbFloat 8s ease-in-out infinite;"></div>

        <!-- Ambient Orb 3 -->
        <div class="absolute top-1/2 left-0 w-[200px] h-[200px] rounded-full pointer-events-none" style="background: radial-gradient(circle, rgba(118,192,68,0.05) 0%, transparent 60%); animation: orbFloat 10s ease-in-out infinite 2s;"></div>

        <!-- Logo Container -->
        <div class="relative z-10 flex flex-col items-center" style="animation: logoReveal 2s cubic-bezier(0.16,1,0.3,1) forwards;">
            <!-- Logo Icon -->
            <div class="relative mb-8">
                <div class="w-28 h-28 rounded-[28px] flex items-center justify-center" style="background: linear-gradient(135deg, #76c044 0%, #5ea031 100%); animation: ringPulse 3s ease-in-out infinite;">
                    <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
                        <circle cx="28" cy="28" r="18" stroke="white" stroke-width="2.5" opacity="0.85"/>
                        <circle cx="28" cy="28" r="7" fill="white" opacity="0.95"/>
                        <line x1="28" y1="6" x2="28" y2="14" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
                        <line x1="28" y1="42" x2="28" y2="50" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
                        <line x1="6" y1="28" x2="14" y2="28" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
                        <line x1="42" y1="28" x2="50" y2="28" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
                        <line x1="12.4" y1="12.4" x2="17.1" y2="17.1" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
                        <line x1="38.9" y1="38.9" x2="43.6" y2="43.6" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
                        <line x1="12.4" y1="43.6" x2="17.1" y2="38.9" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
                        <line x1="38.9" y1="17.1" x2="43.6" y2="12.4" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
                    </svg>
                </div>
                <!-- Glow rings -->
                <div class="absolute -inset-5 rounded-[36px] border border-white/[0.04]" style="animation: pulseGlow 3s ease-in-out infinite 0.5s;"></div>
                <div class="absolute -inset-10 rounded-[44px] border border-white/[0.02]" style="animation: pulseGlow 4s ease-in-out infinite 1s;"></div>
            </div>

            <!-- Brand Name -->
            <h1 class="text-[42px] font-extrabold tracking-tight text-white mb-2.5">
                One<span class="text-brand-primary">Ohm</span>
            </h1>
            <p class="text-[11px] font-semibold tracking-[0.3em] uppercase text-white/30">Solar Energy</p>
        </div>

        <!-- Loading Dots -->
        <div class="absolute bottom-28 left-1/2 -translate-x-1/2 z-10 flex items-center gap-2.5">
            <div class="w-[6px] h-[6px] rounded-full bg-brand-primary" style="animation: dotPulse 1.4s ease-in-out infinite;"></div>
            <div class="w-[6px] h-[6px] rounded-full bg-brand-primary" style="animation: dotPulse 1.4s ease-in-out infinite 0.2s;"></div>
            <div class="w-[6px] h-[6px] rounded-full bg-brand-primary" style="animation: dotPulse 1.4s ease-in-out infinite 0.4s;"></div>
        </div>

        <!-- Tagline -->
        <div class="absolute bottom-14 text-center z-10" style="animation: fadeUp 1.5s ease 1.5s forwards; opacity:0;">
            <p class="text-[10px] text-white/20 tracking-[0.35em] uppercase font-medium">Powering Tomorrow</p>
        </div>
    </div>

    <!-- Auto-redirect -->
    <script>
        setTimeout(() => { window.location.href = '02-onboarding.html'; }, 3500);
    </script>
</body>
</html>
